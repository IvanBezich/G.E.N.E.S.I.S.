name: Deploy Web App (Capa 2)

on:
  push:
    branches:
      - main
    paths:
      - 'the-document-system.md'
      - 'docs/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build Minimal Web App
        run: |
          mkdir .outputs
          echo "<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><title>G.E.N.E.S.I.S. Web App</title><script type='module'>import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs'; mermaid.initialize({ startOnLoad: true, theme: 'dark' });</script><link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css'><style>body{background:#0d1117;color:#c9d1d9;padding:40px;font-family:sans-serif;}.markdown-body{max-width:900px;margin:0 auto;background:#0d1117;}</style></head><body><article class='markdown-body'>" > .outputs/index.html
          
          # Compilar el MD a HTML básico usando un conversor ligero
          curl -L https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js -o marked.js
          echo "<script src='../marked.js'></script><div id='content'></div><script>document.getElementById('content').innerHTML = marked.parse(\`$(cat the-document-system.md)\`);</script>" >> .outputs/index.html
          
          echo "</article></body></html>" >> .outputs/index.html

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.outputs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
